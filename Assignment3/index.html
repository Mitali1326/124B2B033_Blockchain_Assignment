<!DOCTYPE html>
<html>
<head>
    <title>Blockchain DApp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
            background: #2f2f4f;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            margin-bottom: 20px;
        }

        button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 15px;
            margin: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 6px;
            border: none;
            margin-top: 10px;
            text-align: center;
        }

        .wallet {
            background: #3a3a5c;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }

        .output {
            margin-top: 15px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔗 Simple Blockchain DApp</h2>

    <button onclick="connectWallet()">🔌 Connect Wallet</button>
    <p id="account" class="wallet">Wallet not connected</p>

    <input type="number" id="value" placeholder="Enter value">

    <br>

    <button onclick="setValue()">📤 Set Value</button>
    <button onclick="getValue()">📥 Get Value</button>

    <p id="output" class="output"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="script.js"></script>

</body>
</html>
